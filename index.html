<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Website</title>

    <style>
        body {
            margin: 0;
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Welcome MK</h1>

    <p>
        This is my first GitHub website.
    </p>

    <button onclick="showMessage()">
        Click Me
    </button>
</div>

<script>
    function showMessage() {
        alert("Website is working!");
    }
</script>

</body>
</html>
